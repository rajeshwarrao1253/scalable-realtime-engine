# Scalable Real-Time Engine - Docker Compose Stack
# This compose file sets up a complete horizontally-scaled WebSocket cluster
# with Redis as the pub/sub backbone and Nginx as the load balancer.

version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════
  # Redis Cluster (Primary + Replica)
  # ═══════════════════════════════════════════════════════════
  redis-primary:
    image: redis:7-alpine
    container_name: rt-redis-primary
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-primary-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - realtime-network

  redis-replica:
    image: redis:7-alpine
    container_name: rt-redis-replica
    restart: unless-stopped
    command: redis-server --replicaof redis-primary 6379
    volumes:
      - redis-replica-data:/data
    ports:
      - "6380:6379"
    depends_on:
      redis-primary:
        condition: service_healthy
    networks:
      - realtime-network

  # ═══════════════════════════════════════════════════════════
  # WebSocket Server Nodes
  # ═══════════════════════════════════════════════════════════
  websocket-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-ws-node-1
    restart: unless-stopped
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis-primary:6379
      - NODE_ID=ws-node-1
      - NODE_ENV=production
      - LOG_LEVEL=info
    ports:
      - "3001:3001"
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - realtime-network

  websocket-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-ws-node-2
    restart: unless-stopped
    environment:
      - PORT=3002
      - REDIS_URL=redis://redis-primary:6379
      - NODE_ID=ws-node-2
      - NODE_ENV=production
      - LOG_LEVEL=info
    ports:
      - "3002:3002"
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - realtime-network

  # ═══════════════════════════════════════════════════════════
  # Nginx Load Balancer (WebSocket-aware)
  # ═══════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: rt-nginx-lb
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - websocket-1
      - websocket-2
    networks:
      - realtime-network

  # ═══════════════════════════════════════════════════════════
  # Prometheus (Metrics Scraping)
  # ═══════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: rt-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - realtime-network

  # ═══════════════════════════════════════════════════════════
  # Grafana (Metrics Visualization)
  # ═══════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: rt-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - realtime-network

volumes:
  redis-primary-data:
  redis-replica-data:
  prometheus-data:
  grafana-data:

networks:
  realtime-network:
    driver: bridge
