# Nginx Configuration for Scalable Real-Time Engine
# WebSocket-aware load balancer with sticky sessions and health checks

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ═══════════════════════════════════════════════════════════
    # Logging Format (JSON structured logs)
    # ═══════════════════════════════════════════════════════════
    log_format json_combined escape=json
        '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"connection":"$connection",'
        '"connection_requests":$connection_requests'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ═══════════════════════════════════════════════════════════
    # Performance Tuning
    # ═══════════════════════════════════════════════════════════
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 300;
    keepalive_requests 1000;

    # ═══════════════════════════════════════════════════════════
    # Rate Limiting Zones
    # ═══════════════════════════════════════════════════════════
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ═══════════════════════════════════════════════════════════
    # Upstream: WebSocket Server Cluster
    # Uses ip_hash for session affinity (sticky sessions)
    # ═══════════════════════════════════════════════════════════
    upstream websocket_cluster {
        ip_hash;  # Ensures consistent routing for WebSocket handshakes

        server websocket-1:3001 weight=5 max_fails=3 fail_timeout=30s;
        server websocket-2:3002 weight=5 max_fails=3 fail_timeout=30s;

        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ═══════════════════════════════════════════════════════════
    # Upstream: Health Check Endpoint
    # ═══════════════════════════════════════════════════════════
    upstream health_cluster {
        server websocket-1:3001;
        server websocket-2:3002;
    }

    # ═══════════════════════════════════════════════════════════
    # Main Server Block
    # ═══════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ═══════════════════════════════════════════════════════
        # Health Check Endpoint (bypasses WebSocket upgrade)
        # ═══════════════════════════════════════════════════════
        location /health {
            proxy_pass http://health_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ═══════════════════════════════════════════════════════
        # Metrics Endpoint (Prometheus scraping)
        # ═══════════════════════════════════════════════════════
        location /metrics {
            proxy_pass http://health_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
        }

        # ═══════════════════════════════════════════════════════
        # WebSocket Endpoint (Primary)
        # Handles upgrade, keepalive, and proxy buffering
        # ═══════════════════════════════════════════════════════
        location / {
            # Rate limiting
            limit_req zone=ws_limit burst=50 nodelay;
            limit_conn ws_conn 20;

            # Proxy to WebSocket cluster
            proxy_pass http://websocket_cluster;
            proxy_http_version 1.1;

            # ═══════════════════════════════════════════════════
            # WebSocket Upgrade Headers (CRITICAL)
            # These headers transform HTTP to WebSocket
            # ═══════════════════════════════════════════════════
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass original client info to upstream
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts tuned for long-lived WebSocket connections
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # Disable buffering for real-time streaming
            proxy_buffering off;
            proxy_cache off;

            # WebSocket specific
            proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
            proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
            proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        }
    }
}
